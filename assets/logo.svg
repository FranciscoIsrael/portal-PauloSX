<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#primaryGradient)" filter="url(#dropShadow)" />
  
  <!-- Book pages -->
  <path d="M25 25 L75 25 L75 75 L50 70 L25 75 Z" fill="white" opacity="0.9" />
  <path d="M50 25 L50 70" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6" />
  
  <!-- Heart symbol (representing care and health) -->
  <path d="M50 60 C45 55, 35 55, 35 45 C35 40, 40 35, 45 40 C47.5 42.5, 50 45, 50 45 C50 45, 52.5 42.5, 55 40 C60 35, 65 40, 65 45 C65 55, 55 55, 50 60 Z" fill="url(#accentGradient)" />
  
  <!-- DNA helix symbol (representing science and biology) -->
  <g transform="translate(65, 30)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="white" />
    <ellipse cx="0" cy="10" rx="8" ry="3" fill="url(#accentGradient)" />
    <path d="M-8 0 Q0 5, 8 10 M8 0 Q0 5, -8 10" stroke="white" stroke-width="2" fill="none" />
  </g>
  
  <!-- Education symbols (dots representing knowledge) -->
  <circle cx="30" cy="35" r="2" fill="url(#accentGradient)" opacity="0.7" />
  <circle cx="35" cy="32" r="1.5" fill="white" opacity="0.8" />
  <circle cx="40" cy="35" r="2" fill="url(#accentGradient)" opacity="0.7" />
  
  <!-- Protection shield outline -->
  <path d="M50 20 L58 25 L58 35 C58 42, 54 45, 50 48 C46 45, 42 42, 42 35 L42 25 Z" 
        stroke="white" stroke-width="1.5" fill="none" opacity="0.6" />
</svg>
