<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça Palavras - Educação Sexual</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .wordsearch-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .wordsearch-header {
            background: linear-gradient(135deg, var(--info-color, #3b82f6), #2563eb);
            color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
        }

        .wordsearch-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .game-info > div {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .game-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .difficulty-selection {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .difficulty-selection h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .difficulty-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .difficulty-card {
            background: var(--background-color);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .difficulty-card:hover,
        .difficulty-card.selected {
            border-color: var(--info-color, #3b82f6);
            background: rgba(59, 130, 246, 0.05);
        }

        .difficulty-card i {
            font-size: 1.5rem;
            color: var(--info-color, #3b82f6);
            margin-bottom: 0.5rem;
        }

        .difficulty-card h4 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .difficulty-card p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .difficulty-card small {
            color: var(--text-light);
            font-style: italic;
        }

        .player-name-section {
            max-width: 400px;
            margin: 0 auto;
        }

        .player-name-section input {
            margin-bottom: 1rem;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            align-items: start;
        }

        .grid-section {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .grid-container {
            display: flex;
            justify-content: center;
        }

        .wordsearch-grid {
            display: grid;
            gap: 1px;
            background: var(--border-color);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            user-select: none;
        }

        .grid-cell {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-color);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .grid-cell:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .grid-cell.selected {
            background: rgba(59, 130, 246, 0.3);
            color: white;
        }

        .grid-cell.found {
            background: rgba(16, 185, 129, 0.3);
            color: var(--accent-color);
        }

        .grid-cell.hint {
            background: rgba(245, 158, 11, 0.4);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .words-section {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            height: fit-content;
        }

        .words-section h4 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .words-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .word-item {
            background: var(--background-color);
            padding: 0.75rem;
            border-radius: var(--border-radius);
            border-left: 3px solid var(--border-color);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .word-item.found {
            border-left-color: var(--accent-color);
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
        }

        .word-item.found .word-text {
            text-decoration: line-through;
        }

        .word-text {
            font-weight: 500;
            color: var(--text-primary);
        }

        .word-item.found .word-text {
            color: var(--accent-color);
        }

        .word-item i {
            color: var(--accent-color);
        }

        .game-stats {
            background: var(--background-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border-top: 3px solid var(--info-color, #3b82f6);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-item i {
            color: var(--info-color, #3b82f6);
            width: 20px;
        }

        .stat-item span {
            color: var(--text-secondary);
        }

        .completion-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-content {
            position: relative;
            background: var(--surface-color);
            padding: 3rem;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .completion-header {
            margin-bottom: 2rem;
        }

        .completion-header h3 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .completion-header i {
            font-size: 3rem;
            color: var(--secondary-color);
        }

        .completion-stats {
            margin-bottom: 2rem;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .completion-stats .stat-item {
            background: var(--background-color);
            padding: 1rem;
            border-radius: var(--border-radius);
            justify-content: space-between;
        }

        .completion-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .word-found-feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--accent-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 1.125rem;
            z-index: 1500;
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .word-found-feedback.show {
            opacity: 1;
        }

        .word-found-feedback i {
            font-size: 1.25rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 1024px) {
            .game-layout {
                grid-template-columns: 1fr;
            }

            .words-section {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .wordsearch-container {
                padding: 1rem;
            }

            .wordsearch-header {
                padding: 1.5rem;
            }

            .wordsearch-header h1 {
                font-size: 1.5rem;
            }

            .game-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .game-controls {
                width: 100%;
            }

            .game-controls .btn {
                flex: 1;
                min-width: 0;
            }

            .difficulty-options {
                grid-template-columns: 1fr;
            }

            .grid-section,
            .words-section {
                padding: 1rem;
            }

            .grid-cell {
                width: 24px;
                height: 24px;
                font-size: 0.75rem;
            }

            .completion-actions {
                flex-direction: column;
            }

            .completion-actions .btn {
                width: 100%;
            }

            .modal-content {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            .grid-cell {
                width: 20px;
                height: 20px;
                font-size: 0.7rem;
            }

            .word-found-feedback {
                font-size: 1rem;
                padding: 0.75rem 1.5rem;
            }
        }
    </style>
</head>
