<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palavras Cruzadas - Educação Sexual</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .crossword-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .crossword-header {
            background: linear-gradient(135deg, var(--secondary-color), #d97706);
            color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
        }

        .crossword-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .game-info > div {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .game-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .level-selection {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .level-selection h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .level-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .level-btn {
            padding: 2rem 1rem;
            border: 2px solid var(--border-color);
            background: var(--background-color);
            color: var(--text-primary);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .level-btn:hover {
            border-color: var(--secondary-color);
            background: rgba(245, 158, 11, 0.1);
        }

        .level-btn i {
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .level-btn small {
            display: block;
            color: var(--text-light);
            margin-top: 0.5rem;
        }

        .player-name-input {
            max-width: 300px;
            margin: 0 auto;
        }

        .player-name-input input {
            margin-bottom: 1rem;
        }

        .game-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            align-items: start;
        }

        .crossword-grid-container {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .crossword-grid {
            display: grid;
            gap: 1px;
            background: var(--border-color);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            max-width: 100%;
            margin: 0 auto;
        }

        .crossword-cell {
            width: 32px;
            height: 32px;
            position: relative;
            background: var(--text-light);
        }

        .crossword-cell.active {
            background: white;
        }

        .crossword-cell.blocked {
            background: var(--text-primary);
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 0.6rem;
            font-weight: bold;
            color: var(--text-primary);
            line-height: 1;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 0.875rem;
            font-weight: bold;
            color: var(--text-primary);
            text-transform: uppercase;
            padding: 0;
        }

        .cell-input:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: -2px;
        }

        .cell-input.selected {
            background: rgba(99, 102, 241, 0.2);
        }

        .cell-input.highlighted {
            background: rgba(245, 158, 11, 0.3);
        }

        .cell-input.hint-letter {
            background: rgba(16, 185, 129, 0.3);
            color: var(--accent-color);
        }

        .clues-container {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            height: fit-content;
        }

        .clues-section {
            margin-bottom: 2rem;
        }

        .clues-section h4 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .clues-list {
            list-style: none;
        }

        .clues-list li {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--background-color);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .clues-list li:hover {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--primary-color);
        }

        .clues-list li.completed {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: var(--accent-color);
            color: var(--accent-color);
        }

        .clue-number {
            font-weight: 600;
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .clue-text {
            color: var(--text-primary);
        }

        .clue-length {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-left: 0.5rem;
        }

        .completion-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--surface-color);
            padding: 3rem;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .modal-content h3 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .completion-stats {
            margin-bottom: 2rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--background-color);
            border-radius: var(--border-radius);
        }

        .stat-item i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .completion-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 1024px) {
            .game-content {
                grid-template-columns: 1fr;
            }

            .clues-container {
                order: -1;
            }

            .crossword-grid {
                justify-self: center;
            }
        }

        @media (max-width: 768px) {
            .crossword-container {
                padding: 1rem;
            }

            .crossword-header {
                padding: 1.5rem;
            }

            .crossword-header h1 {
                font-size: 1.5rem;
            }

            .game-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .game-controls {
                width: 100%;
            }

            .game-controls .btn {
                flex: 1;
                min-width: 0;
            }

            .level-buttons {
                grid-template-columns: 1fr;
            }

            .crossword-grid-container,
            .clues-container {
                padding: 1rem;
            }

            .crossword-cell {
                width: 24px;
                height: 24px;
            }

            .cell-input {
                font-size: 0.75rem;
            }

            .completion-actions {
                flex-direction: column;
            }

            .completion-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
