<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos e Estatísticas - Educação Sexual</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .charts-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .charts-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
            text-align: center;
        }

        .charts-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .charts-header p {
            opacity: 0.9;
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
        }

        .charts-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .chart-section {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            padding: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .section-header h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin: 0;
        }

        .data-count {
            color: var(--text-secondary);
            font-size: 0.875rem;
            background: var(--background-color);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: var(--background-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .chart-container h4 {
            font-size: 1.125rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .chart-container canvas {
            max-height: 300px;
            width: 100% !important;
            height: auto !important;
        }

        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .ranking-card {
            background: var(--background-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .ranking-card h4 {
            font-size: 1.125rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: center;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-color);
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--surface-color);
            border-radius: var(--border-radius);
            border-left: 3px solid var(--primary-color);
        }

        .ranking-item .rank {
            font-weight: 700;
            color: var(--primary-color);
            min-width: 30px;
        }

        .ranking-item .player {
            flex: 1;
            margin: 0 0.75rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .ranking-item .score,
        .ranking-item .time,
        .ranking-item .votes {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .no-data {
            text-align: center;
            color: var(--text-light);
            font-style: italic;
            padding: 2rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .summary-card {
            background: var(--background-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .summary-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .summary-icon i {
            font-size: 1.5rem;
            color: white;
        }

        .summary-content h4 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .summary-content p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 0;
        }

        .no-data-message {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            padding: 4rem 2rem;
            text-align: center;
        }

        .no-data-content i {
            font-size: 4rem;
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .no-data-content h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .no-data-content p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .no-data-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading-state i {
            margin-right: 0.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            .chart-container {
                min-height: auto;
            }

            .rankings-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .charts-container {
                padding: 1rem;
            }

            .charts-header {
                padding: 1.5rem;
            }

            .charts-header h2 {
                font-size: 1.5rem;
            }

            .charts-controls {
                flex-direction: column;
            }

            .charts-controls .btn {
                width: 100%;
            }

            .chart-section {
                padding: 1rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .charts-row {
                grid-template-columns: 1fr;
            }

            .chart-container {
                padding: 1rem;
            }

            .rankings-grid {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            .summary-card {
                padding: 1.5rem;
            }

            .ranking-item {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }

            .ranking-item .player {
                margin: 0;
            }

            .no-data-message {
                padding: 2rem 1rem;
            }

            .no-data-actions {
                flex-direction: column;
            }

            .no-data-actions .btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }

            .chart-container canvas {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="../assets/logo.jpg" alt="Logo">
            </div>
            <div class="nav-title">
                <h1>Educação Sexual</h1>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <ul class="sidebar-menu">
                <li><a href="../index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="quiz.html"><i class="fas fa-question-circle"></i> Quiz</a></li>
                <li><a href="crossword.html"><i class="fas fa-puzzle-piece"></i> Cruzada</a></li>
                <li><a href="acrostic.html"><i class="fas fa-pen"></i> Acróstico</a></li>
                <li><a href="wordsearch.html"><i class="fas fa-search"></i> Caça Palavras</a></li>
                <li><a href="charts.html" class="active"><i class="fas fa-chart-pie"></i> Gráfico</a></li>
                <li><a href="references.html"><i class="fas fa-book"></i> Referência</a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> Configurações</a></li>
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="charts-container">
            <div class="charts-header">
                <h2>Gráficos e Estatísticas</h2>
                <p>Análise detalhada dos resultados dos jogos e quizzes</p>
                <div class="charts-controls">
                    <button class="btn btn-primary" id="refresh-charts">
                        <i class="fas fa-sync-alt"></i>
                        Atualizar Dados
                    </button>
                    <button class="btn btn-secondary" id="export-data">
                        <i class="fas fa-download"></i>
                        Exportar Dados
                    </button>
                    <button class="btn btn-warning" id="clear-data">
                        <i class="fas fa-trash-alt"></i>
                        Limpar Dados
                    </button>
                </div>
            </div>

            <div id="charts-container">
                <!-- Charts content will be dynamically inserted here -->
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/charts.js"></script>
</body>
</html>
